[project]
name = "vgplot"
dynamic = ["version"]
description = "A Python API for authoring Mosaic vgplot visualizations"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.urls]
homepage = "https://github.com/uwdata/mosaic"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "mosaic-widget",
    "pytest",
    "pytest-cov",
    "ruff",
    "ty",
]
[tool.ruff.lint]
extend-select = [
    "FA",  # https://docs.astral.sh/ruff/rules/#flake8-future-annotations-fa
    "TC",  # https://docs.astral.sh/ruff/rules/#flake8-type-checking-tc
    "UP",  # https://docs.astral.sh/ruff/rules/#pyupgrade-up
]
extend-safe-fixes = [
    "FA",
    "TC",
    "UP",
]
[tool.uv.sources]
"mosaic-widget" = { workspace = true }

[tool.hatch.version]
path = "package.json"
pattern = "\"version\": \"(?P<version>.+?)\""

[tool.hatch.build.targets.wheel]
packages = ["vgplot"]
