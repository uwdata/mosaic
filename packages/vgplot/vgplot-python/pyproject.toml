[project]
name = "vgplot"
dynamic = ["version"]
description = "A Python API for authoring Mosaic vgplot visualizations"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.urls]
homepage = "https://github.com/uwdata/mosaic"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "mosaic-widget",
    "pytest",
    "pytest-cov",
    "ruff",
    "ty",
]

[tool.uv.sources]
"mosaic-widget" = { workspace = true }

[tool.hatch.version]
path = "package.json"
pattern = "\"version\": \"(?P<version>.+?)\""

[tool.hatch.build.targets.wheel]
packages = ["vgplot"]

[tool.pyright]
ignore = ["../**/.venv/"]  # Do not display diagnostics in external source code
typeCheckingMode = "standard"
