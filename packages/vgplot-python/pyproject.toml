[project]
name = "vgplot"
dynamic = ["version"]
description = "Schema wrapper classes for Mosaic"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "pyyaml",
    "narwhals"
]

[project.urls]
homepage = "https://github.com/uwdata/mosaic"

[project.scripts]
generate-schema-wrapper = "schema_wrapper.generate_schema_wrapper:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "jupyterlab",
    "mypy",
    "pytest",
    "pytest-cov",
    "ruff",
    "pandas",
    "mosaic-widget"
]

[tool.uv.sources]
"mosaic-widget" = { workspace = true }

[tool.hatch.version]
path = "package.json"
pattern = "\"version\": \"(?P<version>.+?)\""

[tool.hatch.build.targets.wheel]
packages = ["api", "schema_wrapper"]

# https://mypy.readthedocs.io/en/stable/config_file.html
[tool.mypy]
files = "src/**/*.py"
strict = false
ignore_missing_imports = true
